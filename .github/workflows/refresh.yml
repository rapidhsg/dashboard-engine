# Place this file at  .github/workflows/refresh.yml  in the dashboard-engine repo.
# (kept here as .github-workflows-refresh.yml only because this scaffold folder isn't the repo)

name: refresh-dashboards

on:
  schedule:
    - cron: "2,17,32,47 9-22 * * *" # every 15 min, UTC 9-22 (≈5 AM–6 PM ET) — picks up each report run within ~15 min, quiet overnight
  workflow_dispatch: {} # manual "Run workflow" button

permissions:
  contents: write # allows committing the JSON back to the repo

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build dashboard data
        env:
          ACCULYNX_API_KEY: ${{ secrets.ACCULYNX_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          OUTPUT_DIR: ${{ github.workspace }}
        run: node transform/build.mjs

      - name: Commit refreshed data (only if changed)
        run: |
          git config user.name "dashboard-engine[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rr1-data.json rr2-data.json
          if git diff --staged --quiet; then
            echo "No data change."
          else
            git commit -m "data refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
